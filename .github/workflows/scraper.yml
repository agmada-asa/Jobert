name: Job Scraper

on:
  schedule:
    # Runs every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: "0 */6 * * *"
  workflow_dispatch: # Allow manual trigger from the Actions tab

jobs:
  scrape:
    name: Scrape & Notify
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to commit seen_jobs.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch the latest commit so we can push the state update.
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python scraper.py

      - name: Commit & push updated seen_jobs.json (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json
          if git diff --cached --quiet; then
            echo "No changes to seen_jobs.json — nothing to commit."
          else
            git commit -m "chore: update seen_jobs.json [skip ci]"
            git push
          fi
